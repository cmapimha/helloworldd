trigger:
  branches:
    include:
      - main
pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: "Build & Push Docker Image"

  jobs:
  - template: templates/docker-build-template.yaml
    parameters:
      containerRegistry: $(dockerServiceConnection)
      repositoryName: $(aca-repo)
      dockerfilePath: 'Dockerfile'
      environmentName: $(ado-env)
      pushImage: true
      tag: $(Build.BuildId)

- stage: Deploy
  displayName: "Deploy Azure Container App"
  dependsOn: Build

  jobs:
  - template: templates/Deploy-container-app.yaml
    parameters:
      subscriptionId: $(subscriptionId)
      resourceGroupName: $(resourceGroupName)
      containerAppEnvName: $(containerAppEnvName)
      containerAppName: $(containerAppName)
      containerImage: "$(acrLoginServer)/$(aca-repo):$(Build.BuildId)"
      tag: $(Build.BuildId)
