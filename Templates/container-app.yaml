parameters:
  - name: subscriptionId
    type: string
  - name: resourceGroupName
    type: string
  - name: containerAppEnvName
    type: string
  - name: containerAppName
    type: string
  - name: containerImage
    type: string
  - name: acrLoginServer
    type: string
  - name: serviceConnection
    type: string
  - name: location
    type: string

jobs:
  - job: DeployContainerApp
    displayName: "Deploy Container App to ACA"
    steps:
      - checkout: self

      - task: AzureCLI@2
        displayName: "Deploy Container App"
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Deploying Container App: ${{ parameters.containerAppName }}"

            az deployment group create \
              --resource-group ${{ parameters.resourceGroupName }} \
              --template-file "Bicep Templates/container-app.bicep" \
              --parameters \
                containerAppName=${{ parameters.containerAppName }} \
                containerImage=${{ parameters.containerImage }} \
                environmentId=/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/managedEnvironments/${{ parameters.containerAppEnvName }} \
                acrLoginServer=${{ parameters.acrLoginServer }} \
                location=${{ parameters.location }}

            echo "Container App deployment completed."
