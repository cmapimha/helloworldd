parameters:
  - name: environmentName
    type: string
    default: 'Dev'
  - name: subscriptionId
    type: string
  - name: resourceGroupName
    type: string
  - name: location
    type: string
  - name: acrName
    type: string
  - name: logAnalyticsName
    type: string
  - name: containerAppEnvName
    type: string
  - name: containerAppName
    type: string
  - name: containerImage
    type: string
  - name: serviceConnection
    type: string

jobs:
- deployment: DeployInfra
  displayName: 'Deploy Hello World Infrastructure'
  environment:
    name: '${{ parameters.environmentName }}'
  strategy:
    runOnce:
      deploy:
        steps:
        - checkout: self

        # Create Resource Group
        - task: AzureCLI@2
          displayName: 'Create Resource Group'
          inputs:
            azureSubscription: '${{ parameters.environmentName }}'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az group create \
                -n ${{ parameters.resourceGroupName }} \
                -l ${{ parameters.location }}

        # Deploy ACR
        - task: AzureResourceManagerTemplateDeployment@3
          displayName: 'Deploy ACR'
          inputs:
            azureResourceManagerConnection: '${{ parameters.serviceConnection }}'
            subscriptionId: '${{ parameters.subscriptionId }}'
            resourceGroupName: '${{ parameters.resourceGroupName }}'
            location: '${{ parameters.location }}'
            csmFile: '$(System.DefaultWorkingDirectory)/Bicep Templates/acr.bicep'
            overrideParameters: >
              -acrName ${{ parameters.acrName }}

        # Deploy Log Analytics Workspace
        - task: AzureResourceManagerTemplateDeployment@3
          displayName: 'Deploy Log Analytics'
          inputs:
            azureResourceManagerConnection: '${{ parameters.serviceConnection }}'
            subscriptionId: '${{ parameters.subscriptionId }}'
            resourceGroupName: '${{ parameters.resourceGroupName }}'
            location: '${{ parameters.location }}'
            csmFile: '$(System.DefaultWorkingDirectory)/Bicep Templates/loganalytics.bicep'
            overrideParameters: >
              -workspaceName ${{ parameters.logAnalyticsName }}

        # Deploy ACA Environment
        - task: AzureResourceManagerTemplateDeployment@3
          displayName: 'Deploy Container Apps Environment'
          inputs:
            azureResourceManagerConnection: '${{ parameters.serviceConnection }}'
            subscriptionId: '${{ parameters.subscriptionId }}'
            resourceGroupName: '${{ parameters.resourceGroupName }}'
            location: '${{ parameters.location }}'
            csmFile: '$(System.DefaultWorkingDirectory)/Bicep Templates/containerapp-env.bicep'
            overrideParameters: >
              -environmentName ${{ parameters.containerAppEnvName }}
              -logAnalyticsWorkspaceId /subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.OperationalInsights/workspaces/${{ parameters.logAnalyticsName }}
